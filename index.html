<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🤡 Roba un Payaso Scanner Dashboard</title>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#0b0f14;color:#e0e0e0;overflow-x:hidden}
canvas{position:fixed;top:0;left:0;z-index:-1}

header{text-align:center;padding:20px;font-size:34px;color:#fff;text-shadow:0 0 15px #00ccff}

nav{display:flex;justify-content:center;padding:10px}
nav button{margin:0 8px;padding:10px 18px;background:#161b22;border-radius:8px;color:#ccc;cursor:pointer}
nav button:hover{background:#222}

.tab{display:none;padding:15px}
.tab.active{display:block}

.stats{display:flex;justify-content:space-around}

.detections{display:flex;flex-wrap:wrap;gap:15px;justify-content:center}

.card{background:#14181f;border-radius:12px;padding:12px;width:260px}

.join-btn,.copy-btn{
display:block;margin-top:8px;padding:8px;text-align:center;border-radius:6px
}
.join-btn{background:#1f2933;color:#fff;text-decoration:none}
.copy-btn{background:#333;color:#ccc;cursor:pointer}

.priority{color:#ffd966}
.rarity{color:#8fd3ff}

.leaderboards{display:flex;gap:20px}
.leaderboard{flex:1;background:#14181f;padding:10px;border-radius:10px}

#dashboard-wrapper{display:none}
</style>
</head>

<body>

<canvas id="rain"></canvas>

<div id="dashboard-wrapper">

<header>🤡 Roba un Payaso Scanner Dashboard</header>

<nav>
<button onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('priority')">Top Priority</button>
<button onclick="showTab('leaderboard')">Leaderboard</button>
<button onclick="showTab('helpers')">Helpers</button>
</nav>

<div id="dashboard" class="tab active">
<div class="stats">
<div><div id="total">0</div><div>Total</div></div>
<div><div id="best">None</div><div>Best</div></div>
</div>

<h2>New</h2>
<div id="new-detections" class="detections"></div>

<h2>Old</h2>
<div id="old-detections" class="detections"></div>
</div>

<div id="priority" class="tab">
<h2>Top Priority</h2>
<h3>New</h3>
<div id="priority-new" class="detections"></div>
<h3>Old</h3>
<div id="priority-old" class="detections"></div>
</div>

<div id="leaderboard" class="tab">
<div class="leaderboards">
<div class="leaderboard"><h3>Global</h3><ol id="global-finds"></ol></div>
<div class="leaderboard"><h3>Priority</h3><ol id="prio-finds"></ol></div>
<div class="leaderboard"><h3>Best</h3><ol id="top-brainrots"></ol></div>
</div>
</div>

<div id="helpers" class="tab"><center>gioyuhh • maico</center></div>

</div>

<script>
window.onload=()=>{
const pw=prompt("Enter password:");
if(pw==="macielissocute"){
document.getElementById("dashboard-wrapper").style.display="block";
loadData();
setInterval(loadData,3000);
}else{
document.body.innerHTML="<h1 style='text-align:center;margin-top:20%'>Access Denied</h1>";
}
};

function showTab(id){
if(id==="priority"){
const pass=prompt("Enter Top Priority password:");
if(pass!=="11prio")return;
}
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function formatGen(g){
return g>=1e6?(g/1e6).toFixed(1)+"m":
g>=1e3?(g/1e3).toFixed(1)+"k":g;
}

function rarityLabel(g){
if(g>=1e6)return"<span class='priority'>TOP PRIORITY</span>";
if(g>=1e5)return"<span class='rarity'>Legendary</span>";
if(g>=25000)return"<span class='rarity'>Rare</span>";
return"<span class='rarity'>Common</span>";
}

function copyJob(id){
navigator.clipboard.writeText(id);
}

async function loadData(){
try{
const res=await fetch('https://brainrot-dashboard-ichq.onrender.com/detections');
const data=await res.json();

document.getElementById('total').innerText=data.total||0;
document.getElementById('best').innerText=data.bestFind?
data.bestFind.name+" ("+formatGen(data.bestFind.gen)+")":"None";

const newC=document.getElementById('new-detections');
const oldC=document.getElementById('old-detections');
const pNew=document.getElementById('priority-new');
const pOld=document.getElementById('priority-old');

newC.innerHTML="";
oldC.innerHTML="";
pNew.innerHTML="";
pOld.innerHTML="";

data.detections.forEach(d=>{
if(d.gen<25000)return;

const expired=(Date.now()-d.timestamp)/1000>60;

const card=document.createElement('div');
card.className='card';

card.innerHTML=`
<h2>${d.name}</h2>
<p>Gen: ${formatGen(d.gen)}</p>
<p>${rarityLabel(d.gen)}</p>
<p>Owner: ${d.owner||"Unknown"}</p>
${expired?`<p style="color:red;">Owner left</p>`:
`<a class="join-btn" href="roblox://placeId=86754403332185&gameInstanceId=${d.jobId}">Join</a>
<button class="copy-btn" onclick="copyJob('${d.jobId}')">Copy Job ID</button>`}
`;

if(d.gen>=500000){
expired?pOld.appendChild(card):pNew.appendChild(card);
}else{
expired?oldC.appendChild(card):newC.appendChild(card);
}
});

// leaderboards
const g=document.getElementById('global-finds');
const p=document.getElementById('prio-finds');
const t=document.getElementById('top-brainrots');

g.innerHTML="";
p.innerHTML="";
t.innerHTML="";

data.detections.slice(0,50).forEach(d=>{
g.innerHTML+=`<li>${d.owner||"Unknown"} - ${formatGen(d.gen)}</li>`;
});

data.detections.filter(d=>d.gen>=500000)
.sort((a,b)=>b.gen-a.gen)
.slice(0,50)
.forEach(d=>{
p.innerHTML+=`<li>${d.name} (${formatGen(d.gen)})</li>`;
});

data.detections.sort((a,b)=>b.gen-a.gen)
.slice(0,10)
.forEach(d=>{
t.innerHTML+=`<li>${d.name} (${formatGen(d.gen)})</li>`;
});

}catch(e){console.log(e);}
}

// rain
const canvas=document.getElementById("rain");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let drops=[];
for(let i=0;i<200;i++){
drops.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:5});
}

function rain(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(150,150,255,0.2)";
drops.forEach(d=>{
ctx.fillRect(d.x,d.y,2,10);
d.y+=d.s;
if(d.y>canvas.height){
d.y=0;
d.x=Math.random()*canvas.width;
}
});
}

setInterval(rain,30);
</script>

</body>
</html>
